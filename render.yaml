services:
  - type: web
    name: snowstorm
    env: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: SPRING_DATA_ELASTICSEARCH_CLUSTER_NODES
        fromService:
          name: elasticsearch
          type: pserv
          property: hostport

  - type: pserv
    name: elasticsearch
    env: docker
    plan: standard
    dockerfilePath: ./elasticsearch.Dockerfile
    disk:
      name: esdata
      mountPath: /usr/share/elasticsearch/data
      sizeGB: 10