# Snowstorm runtime overrides for local development.
# Mounted into the container at /config/application-local.properties
# and loaded via --spring.config.additional-location.

# CORS - permissive for local frontend dev (snomed-explorer, snomed-ct-api, etc.)
cors.allowed-origins=*
cors.allowed-origin-patterns=*
cors.allow-credentials=false

# REST API behavior
snowstorm.rest-api.readOnly=false
snowstorm.rest-api.allowUnlimitedConceptPagination=true

# FHIR endpoints (enabled by default; pinned here for clarity)
fhir.enabled=true

# Logging
logging.level.org.snomed.snowstorm=INFO
logging.level.org.elasticsearch.client=WARN
